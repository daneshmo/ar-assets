<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Poster</title>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
}
#container {
  width:100vw;
  height:100vh;
}
</style>
</head>

<body>

<div id="container"></div>

<script>
const start = async () => {

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.querySelector("#container"),
    imageTargetSrc: "https://raw.githubusercontent.com/daneshmo/ar-assets/main/targets.mind"
  });

  const {renderer, scene, camera} = mindarThree;

  const anchor = mindarThree.addAnchor(0);

  const geometry = new THREE.PlaneGeometry(1, 0.6);
  const material = new THREE.MeshBasicMaterial({color: 0xffffff});
  const plane = new THREE.Mesh(geometry, material);

  anchor.group.add(plane);

  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
};

start();
</script>

</body>
</html>
